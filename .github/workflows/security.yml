# Supply-chain gates. Policy lives in deny.toml.
#
# Build, lint, and unit tests live in ci.yml — this workflow is intentionally
# scoped to supply-chain concerns. All cargo-deny legs are blocking; the
# whole point is to reject a PR that introduces a known CVE, banned crate, or
# unapproved license.

name: security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny (${{ matrix.checks }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        checks:
          - advisories
          - bans licenses sources
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}

  geiger:
    name: cargo-geiger (unsafe audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-geiger
        run: cargo install --locked cargo-geiger
      - run: cargo geiger --all-features --output-format GitHubMarkdown
