# Compute-unit profiler. Runs `just bench` on every PR and upserts
# `bench_report.md` (written by the integration-test binary on exit) as a
# PR comment keyed on the `<!-- bench-report -->` marker.

name: Benchmark

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  compute-units:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          solana-version: "stable"
          rust-cache-key: "benchmark"
          save-rust-cache: "true"

      - name: Run benchmark
        run: just bench

      - name: Post bench report comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR=${{ github.event.pull_request.number }}
          MARKER="<!-- bench-report -->"
          REPORT="$MARKER

          $(cat program/payment_channels/bench_report.md)"

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$REPORT"
          else
            gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
              -f body="$REPORT"
          fi
