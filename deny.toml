# Supply-chain policy. See https://embarkstudios.github.io/cargo-deny/
#
# Run locally:
#   cargo install --locked cargo-deny
#   cargo deny check
#
# CI: .github/workflows/security.yml  (Audit: F-12)

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
ignore = [
    # bincode unmaintained — transitive via solana/litesvm dev-deps.
    "RUSTSEC-2025-0141",
    # libsecp256k1 unmaintained — same source.
    "RUSTSEC-2025-0161",
    # ansi_term unmaintained — litesvm transitive dev-dep.
    "RUSTSEC-2021-0139",
    # derivative unmaintained — solana-sdk transitive.
    "RUSTSEC-2024-0388",
    # paste unmaintained — solana-sdk transitive.
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    # webpki-roots: trust-anchor data is CCADB-sourced; rustls relicensed
    # accordingly. OSI-permissive attribution-only.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
